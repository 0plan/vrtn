    h2:
      heading: 왕국의 백성들
    h3:
      heading: 농담세
    h4:
      heading: 사람들이 농담을 그만두다
    blockquote:
      quote: '"어차피" 그가 말했다, "누구나 재미있는 농담을 즐기니, 그 특권에 대가를 치르는 것이 공평하지 않겠나."'
    large:
